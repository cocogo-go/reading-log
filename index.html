<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>우리 가족 대출카드</title>
  <meta name="description" content="도서관을 애용하는 엄마들을 위한 가족 독서기록 앱" />
  <meta name="theme-color" content="#2E5944" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="대출카드" />

  <link rel="stylesheet" href="./src/css/styles.css" />
</head>
<body>
  <div id="app">
    <main class="view" id="view-home" hidden></main>
    <main class="view" id="view-shelf" hidden></main>
    <main class="view" id="view-underline" hidden></main>
    <main class="view" id="view-settings" hidden></main>

    <nav class="tabbar">
      <button class="tab" data-tab="home" aria-current="false">
        <span class="tab-icon">🏠</span>
        <span>홈</span>
      </button>
      <button class="tab" data-tab="shelf" aria-current="false">
        <span class="tab-icon">📚</span>
        <span>책장</span>
      </button>
      <div class="tab-add">
        <button class="tab-add-btn" id="btn-add" aria-label="기록 추가">＋</button>
      </div>
      <button class="tab" data-tab="underline" aria-current="false">
        <span class="tab-icon">✍️</span>
        <span>밑줄</span>
      </button>
      <button class="tab" data-tab="settings" aria-current="false">
        <span class="tab-icon">⚙️</span>
        <span>설정</span>
      </button>
    </nav>
  </div>

  <script type="module" src="./src/js/app.js"></script>
</body>
</html>
